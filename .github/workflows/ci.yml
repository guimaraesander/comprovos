name: CI ComprovOS

on:
  push:
    branches:
      - main
      - main-teste
  pull_request:
    branches:
      - main
      - main-teste

jobs:
  backend:
    name: Backend - Install, Build and Test
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/comprovos_ci
      JWT_SECRET: ci-jwt-secret
      NODE_ENV: test
      PORT: 3333

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Gerar Prisma Client
        run: npm run prisma:generate

      - name: Rodar testes do backend
        run: npm run test:run

      - name: Build backend
        run: npm run build

  frontend:
    name: Frontend - Install, Build and Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Rodar testes do frontend
        run: npm run test:run

      - name: Build frontend
        run: npm run build