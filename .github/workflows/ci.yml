name: CI ComprovOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend - Install and Build
    runs-on: ubuntu-latest

    env:
      # Variáveis necessárias para o build do backend / Prisma Client no CI
      # Não precisa conectar em banco real para prisma generate + tsc
      DATABASE_URL: postgresql://ci:ci@localhost:5432/comprovos_ci
      JWT_SECRET: ci-jwt-secret
      NODE_ENV: test
      PORT: 3333

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Gerar Prisma Client
        run: npm run prisma:generate

      - name: Build backend
        run: npm run build

  frontend:
    name: Frontend - Install and Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Build frontend
        run: npm run build