name: CI ComprovOS

on:
  push:
    branches:
      - main
      - main-teste
  pull_request:
    branches:
      - main
      - main-teste
  workflow_dispatch:

jobs:
  backend:
    name: Backend - Install, Build and Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: comprovos_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/comprovos_ci
      JWT_SECRET: ci-jwt-secret
      NODE_ENV: test
      PORT: 3333

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Gerar Prisma Client
        run: npm run prisma:generate

      - name: Rodar testes do backend
        run: npm run test:run

      - name: Build backend
        run: npm run build

  frontend:
    name: Frontend - Install, Build and Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Rodar testes do frontend
        run: npm run test:run

      - name: Build frontend
        run: npm run build

  deploy:
    name: Deploy automatico
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    env:
      BACKEND_DEPLOY_HOOK: ${{ secrets.BACKEND_DEPLOY_HOOK }}
      FRONTEND_DEPLOY_HOOK: ${{ secrets.FRONTEND_DEPLOY_HOOK }}

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Validar hooks de deploy
        id: hooks
        run: |
          if [ -n "${BACKEND_DEPLOY_HOOK}" ]; then
            echo "has_backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_backend=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "${FRONTEND_DEPLOY_HOOK}" ]; then
            echo "has_frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_frontend=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy backend via webhook
        if: steps.hooks.outputs.has_backend == 'true'
        run: |
          echo "Disparando deploy do backend..."
          curl -fsSL -X POST "$BACKEND_DEPLOY_HOOK" \
            -H "Content-Type: application/json" \
            -d "{}"

      - name: Deploy frontend via webhook
        if: steps.hooks.outputs.has_frontend == 'true'
        run: |
          echo "Disparando deploy do frontend..."
          curl -fsSL -X POST "$FRONTEND_DEPLOY_HOOK" \
            -H "Content-Type: application/json" \
            -d "{}"

      - name: Sem hooks de deploy configurados
        if: steps.hooks.outputs.has_backend == 'false' && steps.hooks.outputs.has_frontend == 'false'
        run: |
          echo "Deploy automatico configurado, mas sem BACKEND_DEPLOY_HOOK e FRONTEND_DEPLOY_HOOK."
          echo "Defina esses secretos no repositorio para ativar o deploy automatico."
