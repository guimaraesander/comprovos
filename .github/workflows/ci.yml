name: CI ComprovOS

on:
  push:
    branches:
      - main
      - main-teste
  pull_request:
    branches:
      - main
      - main-teste
  workflow_dispatch:

jobs:
  backend:
    name: Backend - Install, Build and Test
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/comprovos_ci
      JWT_SECRET: ci-jwt-secret
      NODE_ENV: test
      PORT: 3333

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Gerar Prisma Client
        run: npm run prisma:generate

      - name: Rodar testes do backend
        run: npm run test:run

      - name: Build backend
        run: npm run build

  frontend:
    name: Frontend - Install, Build and Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Rodar testes do frontend
        run: npm run test:run

      - name: Build frontend
        run: npm run build

  deploy:
    name: Deploy automatico
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    if: |
      github.event_name != 'pull_request' && (
        github.ref == 'refs/heads/main' ||
        github.event_name == 'workflow_dispatch'
      )

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Deploy backend via webhook
        if: ${{ secrets.BACKEND_DEPLOY_HOOK != '' }}
        env:
          BACKEND_DEPLOY_HOOK: ${{ secrets.BACKEND_DEPLOY_HOOK }}
        run: |
          echo "Disparando deploy do backend..."
          curl -fsSL -X POST "$BACKEND_DEPLOY_HOOK" \
            -H "Content-Type: application/json" \
            -d "{}"

      - name: Deploy frontend via webhook
        if: ${{ secrets.FRONTEND_DEPLOY_HOOK != '' }}
        env:
          FRONTEND_DEPLOY_HOOK: ${{ secrets.FRONTEND_DEPLOY_HOOK }}
        run: |
          echo "Disparando deploy do frontend..."
          curl -fsSL -X POST "$FRONTEND_DEPLOY_HOOK" \
            -H "Content-Type: application/json" \
            -d "{}"

      - name: Sem hooks de deploy configurados
        if: ${{ secrets.BACKEND_DEPLOY_HOOK == '' && secrets.FRONTEND_DEPLOY_HOOK == '' }}
        run: |
          echo "Deploy automatico configurado, mas sem BACKEND_DEPLOY_HOOK e FRONTEND_DEPLOY_HOOK."
          echo "Defina esses secretos no repositorio para ativar o deploy automatico."
